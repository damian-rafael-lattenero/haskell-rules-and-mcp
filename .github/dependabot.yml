version: 2
updates:
  # GitHub Actions themselves — pinning by major-version tag is what the
  # existing Haskell CI uses; Dependabot handles the refresh cadence so
  # a compromised action upstream doesn't linger. No Hackage ecosystem
  # (Dependabot doesn't support it yet); the `outdated` advisory job in
  # haskell-ci.yml covers drift on the Haskell side.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
