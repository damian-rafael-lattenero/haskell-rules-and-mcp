name: Build CI image

# ---------------------------------------------------------------------------
# Builds and publishes the haskell-flows CI base image to GHCR.
#
# The image (`.docker/Dockerfile.ci`) bakes in:
#   * GHC + cabal at the matrix versions (one image per GHC).
#   * hlint binary on PATH.
#   * ~/.cabal/store/ pre-populated with the cabal.project.freeze
#     dep closure + the E2E Baseline fixture's QuickCheck closure.
#
# Tagging strategy:
#   `ghcr.io/<owner>/haskell-flows-ci:<ghc>-<freeze-hash>`
#   `ghcr.io/<owner>/haskell-flows-ci:<ghc>-latest`
#
# Triggers (any of):
#   * push to master that touches the freeze file or the Dockerfile
#   * weekly schedule (re-warm against current Hackage index)
#   * manual workflow_dispatch
#
# Consuming the image (future commit, gated on first successful build):
#   `haskell-ci.yml`'s build-and-test job will set
#   `container: ghcr.io/<owner>/haskell-flows-ci:9.12.2-<hash>` and
#   skip ghcup install + cabal-store cache restore on its critical
#   path. That replaces ~3 min of cold-start with ~10 s of pull.
#
# Costs nothing on the consumer side: GHCR pulls are free for public
# images, and the workflow itself uses the auto-provided GITHUB_TOKEN
# so no PAT is required.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [master]
    paths:
      - "mcp-server-haskell/cabal.project.freeze"
      - "mcp-server-haskell/cabal.project"
      - "mcp-server-haskell/haskell-flows-mcp.cabal"
      - "mcp-server-haskell/test-e2e/Fixtures/**"
      - ".docker/Dockerfile.ci"
      - ".github/workflows/build-ci-image.yml"
  schedule:
    # Weekly Sunday 03:00 UTC — keeps the image fresh against Hackage
    # index drift even when our freeze file is stable.
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # required to push to GHCR via GITHUB_TOKEN

jobs:
  build-image:
    name: Build CI image — GHC ${{ matrix.ghc }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ghc: "9.10.1", cabal: "3.12.1.0" }
          - { ghc: "9.12.2", cabal: "3.12.1.0" }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # cabal.project.freeze is gitignored (per-machine artifact),
      # so we generate one inside the workflow before the Docker build
      # consumes it. Need a host GHC+cabal for `cabal freeze` itself.
      - id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
          cabal-update: true

      - name: Generate cabal.project.freeze
        working-directory: mcp-server-haskell
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal freeze
          ls -la cabal.project.freeze

      - name: Compute freeze hash (image tag)
        id: hash
        run: |
          freeze_hash=$(sha256sum mcp-server-haskell/cabal.project.freeze \
                         | cut -c1-12)
          echo "freeze=$freeze_hash" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile.ci
          push: true
          build-args: |
            GHC_VERSION=${{ matrix.ghc }}
            CABAL_VERSION=${{ matrix.cabal }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/haskell-flows-ci:${{ matrix.ghc }}-${{ steps.hash.outputs.freeze }}
            ghcr.io/${{ github.repository_owner }}/haskell-flows-ci:${{ matrix.ghc }}-latest
          # Layer cache lives in the registry so re-runs reuse layers
          # across pushes. Cheaper than rebuilding GHC + deps each time.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/haskell-flows-ci:cache-${{ matrix.ghc }}
          cache-to:   type=registry,ref=ghcr.io/${{ github.repository_owner }}/haskell-flows-ci:cache-${{ matrix.ghc }},mode=max
