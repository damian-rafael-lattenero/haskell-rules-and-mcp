name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # Integration and e2e tests require GHC. They're skip-gracefully without
      # it via `describe.runIf(GHC_AVAILABLE)`, but we still run to catch any
      # test that shouldn't have that guard.
      - name: Setup GHC (optional, for integration/e2e)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12"
          cabal-version: "3.12"

      - name: Integration tests
        run: npm run test:integration

      - name: E2E tests
        run: npm run test:e2e

  validate-tool-urls:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate release URLs
        # HEAD each URL declared in vendor-tools/bundled-tools-manifest.json
        # and fail if any 404s or returns an HTML 200 (CDN-style "not found").
        run: npm run tools:validate:urls
