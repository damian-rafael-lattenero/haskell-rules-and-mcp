name: Release

# Triggered by semver-style tag pushes. Builds a clean `dist/` + packs the
# publishable artifact and attaches it to the GitHub release the
# maintainer creates (or will create). Does NOT publish to npm — that's a
# deliberate decision for an experimental MCP; users install from source.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # needed to upload release assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-artifacts:
    name: Build + attach release artifacts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test # unit only; fast sanity check before we publish anything

      # Pack a redistributable tarball. `npm pack` respects `files` in
      # package.json so we only ship dist/ + rules/ + vendor-tools/ + the
      # manifest metadata — not the whole source tree.
      - name: Build redistributable tarball
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --silent)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          sha256sum "$TARBALL" | tee "${TARBALL}.sha256"
          ls -la "$TARBALL" "${TARBALL}.sha256"

      - name: Upload artifacts to the existing GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set -euo pipefail
          # If the release already exists (maintainer created it via the
          # CLI before pushing the tag), we attach. Otherwise we create it
          # using the CHANGELOG.md entry as the body — auto-attached tarball
          # means consumers never see an empty release.
          cd ..
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "mcp-server/$TARBALL" "mcp-server/${TARBALL}.sha256" --clobber
          else
            # Extract only the section for this version from CHANGELOG.md.
            awk -v tag="$TAG" 'BEGIN{p=0} \
              $0 ~ "^## \\["tag "]" || $0 ~ "^## \\[" substr(tag,2) "]" {p=1; next} \
              p && /^## \[/ {exit} \
              p' CHANGELOG.md > /tmp/release-notes.md
            if [ ! -s /tmp/release-notes.md ]; then
              echo "Release notes for $TAG not found in CHANGELOG.md — using generic body." > /tmp/release-notes.md
              echo "See CHANGELOG.md for details." >> /tmp/release-notes.md
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              "mcp-server/$TARBALL" "mcp-server/${TARBALL}.sha256"
          fi
