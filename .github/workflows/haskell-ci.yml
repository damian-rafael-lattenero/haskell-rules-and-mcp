name: Haskell CI

# ---------------------------------------------------------------------------
#  Continuous integration for the `mcp-server-haskell/` package — the
#  Haskell rewrite of the MCP server. Modelled on conventions used by
#  haskell/cabal, jgm/pandoc, and well-typed/generics-sop: matrix across
#  supported GHC/OS pairs, cabal-store cache keyed on the freeze file,
#  haddock/cabal-check/sdist gates, and separate hlint + fourmolu linters.
#
#  A single ``required`` job at the bottom folds every gate's result into
#  one status check that branch protection can enforce — see GitHub
#  Settings → Branches → "Require status checks" and point at it.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [master]
    paths:
      - "mcp-server-haskell/**"
      - ".github/workflows/haskell-ci.yml"
    tags: ["v*.*.*"]      # triggers the release job
  pull_request:
    branches: [master]
    paths:
      - "mcp-server-haskell/**"
      - ".github/workflows/haskell-ci.yml"
  workflow_dispatch: {}

# Concurrency policy: PR runs are cancelled when a new push lands
# on the same PR head, master runs are NEVER cancelled so every
# commit on the protected branch gets its own green/red signal.
#
# Why this exact shape — past attempts at
# `cancel-in-progress: ${{ <conditional> }}` got cancelled
# anyway (~50% of master runs over the last 50). GitHub Actions
# stringifies the expression result, and "false" as a string is
# truthy in some evaluation paths, so the conditional silently
# became `cancel-in-progress: true` for master.
#
# The bulletproof pattern: make each master commit's group key
# unique (per-SHA), so it never SHARES a lock with another
# in-flight run. With nothing to cancel, the cancel-in-progress
# value doesn't matter — no expression-stringification footgun.
#
# PR runs still share a per-ref group so a new push on the same
# PR head DOES cancel the previous build (the desired behaviour
# for iterative PR feedback).
concurrency:
  group: haskell-ci-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

# Least-privilege by default. Individual jobs ask for extras explicitly.
permissions:
  contents: read

defaults:
  run:
    working-directory: mcp-server-haskell

jobs:
  # -------------------------------------------------------------------------
  #  Tier-2 sharded ubuntu matrix: asymmetric 2+4 = 6 cells, all blocking.
  #
  #  Layout:
  #    * GHC 9.10.1 → 2 shards (1/2, 2/2)         = 2 cells
  #    * GHC 9.12.2 → 4 shards (1/4, 2/4, 3/4, 4/4) = 4 cells
  #    * Total                                     = 6 cells
  #
  #  Each (OS, GHC) cell-set uses a unique shard divisor so the
  #  same "i/N" pattern never repeats across the matrix — every
  #  cell is structurally distinct. The 9.10.1 (older GHC) gets
  #  the smaller 2-way split because the surface area we care
  #  about is "still compiles cleanly under 9.10"; the 9.12.2
  #  (newer, gating GHC) gets a finer 4-way split for faster
  #  per-cell wall-clock.
  #
  #  Measured: full e2e sequentially = 467 s (CI baseline). Local
  #  shard 1/3 with N=8 = 166 s for 24 scenarios. Projected CI
  #  wall-clock per shard cell ≈ 200-300 s depending on divisor
  #  (4-way shards are ~25 s faster than 3-way shards on the
  #  fast-scenario subset; slow scenarios stay sequential and
  #  dominate the floor either way).
  #
  #  Why ubuntu-only here (macOS is a separate advisory job below):
  #  the aggregator 'needs: [build-and-test, hlint]' waits for
  #  EVERY cell of the matrix to complete before running. Keeping
  #  macOS in this matrix would make the aggregator wait for the
  #  ~13 min macOS cell even though it's continue-on-error and
  #  doesn't gate. Splitting macOS into its own job removes that
  #  wait without changing what blocks vs. what's advisory.
  # -------------------------------------------------------------------------
  build-and-test:
    name: Build & test — ubuntu / GHC ${{ matrix.ghc }} / shard ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        # Asymmetric matrix: each (GHC) gets a unique shard
        # divisor so the same "i/N" pattern never repeats across
        # cells. 9.10.1 splits 2-way (smaller, older GHC), 9.12.2
        # splits 4-way (newer, gating GHC; finer-grained for
        # faster per-cell wall-clock). Total = 2 + 4 = 6 ubuntu
        # cells, all blocking.
        #
        # include-ONLY (no base keys); each entry is a full cell.
        # If we kept e.g. `cabal: ["3.12.1.0"]` as a base key,
        # GitHub Actions would treat the include entries as
        # overrides on the single base cell rather than as
        # standalone cells, collapsing the whole matrix to one
        # cell with the values of the LAST include entry. (The
        # previous shape of this matrix did exactly that — one
        # commit shipped with a single ubuntu/9.12.2 shard 4/4
        # cell instead of all six. Lesson pinned in the comment.)
        include:
          - { ghc: "9.10.1", cabal: "3.12.1.0", shard: "1/2" }
          - { ghc: "9.10.1", cabal: "3.12.1.0", shard: "2/2" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "1/4" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "2/4" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "3/4" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "4/4" }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: setup
        name: Set up GHC ${{ matrix.ghc }} / cabal ${{ matrix.cabal }}
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
          cabal-update: true

      # Freeze BEFORE cache so the key reflects the exact dependency plan.
      # This is what haskell/cabal and pandoc do — hashing cabal.project
      # alone under-invalidates when Hackage index advances.
      - name: Configure + freeze
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal freeze

      - name: Restore cabal store cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-${{ hashFiles('mcp-server-haskell/cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      - name: Build project
        run: cabal build all

      # HLint must be on PATH before `cabal test all`. The MCP's own
      # `ghc_toolchain_status` and `ghc_lint` tools probe for hlint
      # at runtime via `findExecutable`; absent it they report
      # `available=false` and `success=false`, which the FlowToolchain
      # + FlowQualityGates e2e scenarios legitimately flag as a red
      # toolchain. `haskell-actions/setup@v2` installs cabal + ghc but
      # not hlint, so we stage hlint separately here. Keep this step
      # right BEFORE `Run tests` so cache hits above don't skip it.
      - name: Install HLint
        uses: haskell-actions/hlint-setup@v2
        with:
          version: "latest"

      # Two stacked perf knobs:
      #
      # 1. HASKELL_FLOWS_E2E_PARALLEL=8 — opts the e2e harness
      #    into its built-in QSem-bounded pool. Auto-clamps to
      #    the RTS capability count (`min k numCaps`), so on a
      #    4-vCPU runner the effective fan-out is 4. '8' is the
      #    forward-compat hint for a future bigger-runner.
      #
      # 2. HASKELL_FLOWS_E2E_SHARD=${{ matrix.shard }} — picks
      #    1/3 of the 70 scenarios via round-robin (E2E.Sharding).
      #    Three matrix cells per GHC version run truly in
      #    parallel on separate runners, each with its own clean
      #    ~/.cabal/store — eliminating the cross-scenario lock
      #    contention that capped the in-process pool at ~10%
      #    speedup.
      #
      # Local measurement (8-core macOS, parallelism=8):
      #   full e2e (sequential, baseline) : 467 s
      #   full e2e (N=8, no shard)        : 419 s   (-10%)
      #   shard 1/3 (24 scenarios, N=8)   : 166 s   (35% of full)
      #
      # Projected CI per-cell (4-vCPU ubuntu, shard cell):
      #   GHC install (cached)            :  ~10 s
      #   Build project (cached)          :  ~30 s
      #   Run tests                       : ~250 s
      #     - unit (514)                  :  ~17 s
      #     - e2e (~23 of 70)             : ~230 s
      #   Haddock + cabal check + sdist   :  ~65 s
      #   Cell total (warm cache)         : ~360 s  (= 6.0 min)
      #
      # Aggregator wall-clock to green = max(6 ubuntu shards) ≈
      # 6 min (vs current 13 min). macOS runs in a separate job
      # below as advisory.
      - name: Run tests
        env:
          HASKELL_FLOWS_E2E_PARALLEL: "8"
          HASKELL_FLOWS_E2E_SHARD: ${{ matrix.shard }}
        run: cabal test all --test-show-details=direct --test-options="--color"

      # Haddock with `--haddock-all` spots broken @<https://...>@ links,
      # dangling @-refs, and modules missing from the package description.
      - name: Build haddocks
        run: cabal haddock all --haddock-all

      - name: Cabal check (package metadata sanity)
        run: cabal check

      # Proves the package can be published to Hackage. Round-tripping the
      # tarball catches missing extra-source-files and bad file globs.
      - name: SDist round-trip
        run: |
          cabal sdist all --output-dir /tmp/haskell-flows-mcp-sdist
          ls -la /tmp/haskell-flows-mcp-sdist

  # -------------------------------------------------------------------------
  #  macOS portability canary — advisory, sharded.
  #
  #  Cell-count is asymmetric across GHC versions to fit GitHub's
  #  free-tier macOS concurrent-runner cap (5 simultaneous macOS
  #  runners per org). With 6 cells, one was always queued — the
  #  queue compounded across in-flight commits and surfaced as
  #  pseudo-cancellations in the matrix UI. Five cells hits the
  #  ceiling exactly without spilling for a single in-flight run.
  #
  #  Layout (3+2 = 5 cells):
  #    * GHC 9.10.1 → 2 shards (1/2, 2/2)        = 2 cells
  #    * GHC 9.12.2 → 3 shards (1/3, 2/3, 3/3)   = 3 cells
  #    * Total                                    = 5 cells
  #
  #  Coverage rationale: every scenario runs on macOS twice
  #  (once via the 9.10.1 2-way split, once via the 9.12.2 3-way
  #  split) — strictly more redundancy per scenario than a flat
  #  3×2-design where each scenario ran exactly once per GHC
  #  version.
  #
  #    * 'continue-on-error: true' — failure / cancellation never blocks.
  #    * Deliberately NOT in 'required.needs' — the aggregator does not
  #      WAIT for this job, so the green-check signal arrives via the
  #      ubuntu shards alone.
  #
  #  When multiple master commits land back-to-back and saturate
  #  the org-wide cap (4 in-flight × 5 cells = 20 macOS jobs vs
  #  quota=5), the queue drains naturally — the workflow does NOT
  #  use cancel-in-progress at the job level so older commits keep
  #  their macOS jobs alive. Trade is wall-clock to drain (~26 min
  #  for 9 jobs at 5-concurrent); the green-streak counter waits
  #  for that drain but the aggregator (ubuntu + hlint) doesn't.
  # -------------------------------------------------------------------------
  build-and-test-macos:
    name: Build & test — macOS / GHC ${{ matrix.ghc }} / shard ${{ matrix.shard }} (advisory)
    strategy:
      fail-fast: false
      matrix:
        # Asymmetric matrix: 9.10.1 splits 2-way, 9.12.2 splits
        # 3-way. include-ONLY (no base keys) — see ubuntu matrix
        # comment above for why. Total = 5 cells, which fits the
        # free-tier macOS concurrent-runner cap for a single
        # in-flight run.
        include:
          - { ghc: "9.10.1", cabal: "3.12.1.0", shard: "1/2" }
          - { ghc: "9.10.1", cabal: "3.12.1.0", shard: "2/2" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "1/3" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "2/3" }
          - { ghc: "9.12.2", cabal: "3.12.1.0", shard: "3/3" }
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - id: setup
        name: Set up GHC ${{ matrix.ghc }} / cabal ${{ matrix.cabal }}
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
          cabal-update: true

      - name: Configure + freeze
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal freeze

      - name: Restore cabal store cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-${{ hashFiles('mcp-server-haskell/cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ matrix.cabal }}-

      - name: Build dependencies
        run: cabal build all --only-dependencies

      - name: Build project
        run: cabal build all

      # 'haskell-actions/hlint-setup@v2' ships only x86_64 prebuilt
      # binaries — it fails on macos-latest (now arm64) with
      # "Unsupported architecture hlint: arm64". Homebrew has a
      # native aarch64 bottle; the standalone 'hlint' job on
      # ubuntu remains the authoritative version gate, so brew's
      # version on macOS is only consumed by the e2e
      # 'findExecutable "hlint"' probe and minor drift is fine.
      - name: Install HLint (Homebrew)
        shell: bash
        run: |
          brew install hlint
          hlint --version

      # Shard string is per-cell from the matrix include block —
      # 1/2 and 2/2 on GHC 9.10.1, 1/3..3/3 on GHC 9.12.2. The
      # E2E.Sharding harness honours arbitrary "i/n" so both
      # split widths work without harness changes. Each cell's
      # union with its same-GHC siblings covers the full 70-scenario
      # suite once per GHC version.
      - name: Run tests
        env:
          HASKELL_FLOWS_E2E_PARALLEL: "8"
          HASKELL_FLOWS_E2E_SHARD: ${{ matrix.shard }}
        run: cabal test all --test-show-details=direct --test-options="--color"

      - name: Build haddocks
        run: cabal haddock all --haddock-all

      - name: Cabal check (package metadata sanity)
        run: cabal check

      - name: SDist round-trip
        run: |
          cabal sdist all --output-dir /tmp/haskell-flows-mcp-sdist
          ls -la /tmp/haskell-flows-mcp-sdist

  # -------------------------------------------------------------------------
  #  HLint with inline PR annotations. Fails on any 'suggestion' severity or
  #  above — matches the zero-tolerance stance locked in during Phase 2-3.
  # -------------------------------------------------------------------------
  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up HLint
        uses: haskell-actions/hlint-setup@v2
        # 'latest' tracks the bundled hlint used by the local ghc_lint
        # tool (currently 3.10). Pinning an older version here drifted
        # from the local zero-suggestions baseline because newer hlint
        # releases relax hints that older ones still emit.
        with:
          version: "latest"

      - name: Run HLint
        uses: haskell-actions/hlint-run@v2
        # Single-path form. Earlier I tried the JSON-array form via YAML
        # folded scalar (`>-`) which the action's parser rejected with
        # `SyntaxError: Unexpected end of JSON input`; letting hlint
        # recurse through the package root is simpler and covers
        # src/, test/, and app/ in one pass.
        with:
          path: mcp-server-haskell/
          # 'warning' (not 'suggestion') is the pragmatic threshold: we
          # already block on hints locally via ghc_lint, and CI HLint
          # version drift can surface stylistic suggestions that don't
          # warrant a merge block. Warnings and errors remain blocking.
          fail-on: warning

  # -------------------------------------------------------------------------
  #  Fourmolu job intentionally omitted.
  #
  #  Rationale: the codebase uses the leading-comma / grouped-import style
  #  from Phase 1, which doesn't match any of fourmolu 0.16.x's built-in
  #  `import-export-style` presets exactly. Enabling the check would
  #  require a whole-tree rewrite that touches every module for no
  #  semantic benefit. Local hlint (ghc_lint) already enforces style
  #  hygiene; re-adding fourmolu is a future decision once we're willing
  #  to commit one big reformat PR.
  # -------------------------------------------------------------------------

  # -------------------------------------------------------------------------
  #  Advisory scan for stale dependency bounds. Runs on every push but is
  #  allowed to fail without blocking the merge — the goal is to surface
  #  drift, not to chase every Hackage bump on the critical path.
  #
  #  Why step-level `continue-on-error` instead of job-level:
  #
  #  A job with `continue-on-error: true` does not block the pipeline,
  #  but it still renders as a red ❌ in the Actions UI when any step
  #  fails — which is visually indistinguishable from a real regression.
  #  `haskell-actions/setup@v2`'s ghcup install is a known flake source
  #  (CDN hiccups surface as `Error: <No error message>` with no
  #  actionable content), and a red badge on a non-actionable advisory
  #  job trains everyone to ignore CI signal. Worse than useless.
  #
  #  Moving `continue-on-error` to each step keeps the outer job green
  #  while surfacing per-step failures as ⚠️ warnings with annotations.
  #  The drift signal we actually want from `cabal outdated` is still
  #  visible (just not blocking), the toolchain flake is surfaced as a
  #  warning, and the job badge is honest: green means "we ran it,
  #  here's what we saw" rather than "definitely broken".
  # -------------------------------------------------------------------------
  outdated:
    name: Outdated dependencies (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: setup
        continue-on-error: true
        with:
          ghc-version: "9.12.2"
          cabal-version: "3.12.1.0"
          cabal-update: true

      - name: Report outdated bounds
        if: steps.setup.outcome == 'success'
        continue-on-error: true
        run: cabal outdated --exit-code

      - name: Note setup flake
        if: steps.setup.outcome == 'failure'
        run: |
          echo "::warning title=Toolchain install flaked::haskell-actions/setup@v2 failed with no actionable message — typical ghcup CDN flake. The advisory scan was skipped for this run; re-run the workflow if you want a fresh drift report."

  # -------------------------------------------------------------------------
  #  Single aggregation job. Branch protection should require *only* this
  #  check — the matrix jobs change shape as we add GHC versions, and this
  #  keeps the branch-protection config stable.
  # -------------------------------------------------------------------------
  required:
    name: Haskell CI required
    runs-on: ubuntu-latest
    # Run on every trigger EXCEPT tag pushes (those go to the release
    # job). The original form was `always() && X || Y` which relies on
    # GitHub Actions precedence `(always() && X) || Y`; equivalent but
    # hard to scan. The simplified form below is the same truth table
    # across the four trigger shapes (push to master / PR / dispatch /
    # tag push).
    if: always() && !startsWith(github.ref, 'refs/tags/')
    needs: [build-and-test, hlint]
    permissions:
      contents: read
      # statuses:write so the final step below can post a commit
      # status derived from the aggregated check-run results. See
      # the "Publish commit status" step for the rationale.
      statuses: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Assert every required dependency succeeded
        id: assert
        run: |
          if [[ "${{ needs.build-and-test.result }}" != "success" ]] \
          || [[ "${{ needs.hlint.result }}"          != "success" ]]; then
            echo "One or more required Haskell CI jobs failed."
            echo "agg_state=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All required Haskell checks green."
          echo "agg_state=success" >> "$GITHUB_OUTPUT"

      # GitHub's repo favicon reflects the *legacy* Commit Status API
      # (posted via `POST /repos/:o/:r/statuses/:sha`), not the newer
      # check-runs API that Actions publishes through. With zero legacy
      # statuses on a commit, the combined status is 'pending' and the
      # favicon gets a red X overlay even when every check-run passed.
      #
      # This step posts a single legitimate commit status derived from
      # the aggregated result above (build-and-test + hlint), so the
      # combined status reflects the real CI outcome. `if: always()`
      # so a failing CI still posts a `failure` status — we want the
      # favicon to be honest about red runs too, not only green ones.
      - name: Publish combined commit status
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const state = '${{ steps.assert.outputs.agg_state }}' || 'failure';
            const build = '${{ needs.build-and-test.result }}';
            const lint  = '${{ needs.hlint.result }}';
            const description =
              state === 'success'
                ? `Haskell CI green (build-and-test=${build}, hlint=${lint})`
                : `Haskell CI red (build-and-test=${build}, hlint=${lint})`;
            const { owner, repo } = context.repo;
            const sha = context.sha;
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state,
              context: 'ci/haskell-combined',
              description: description.slice(0, 140),
              target_url: `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`
            });

  # -------------------------------------------------------------------------
  #  Release — fires only on `v*.*.*` tag push. Builds the sdist tarball
  #  (Hackage-compatible) + an installed binary per OS, attaches every
  #  artefact to the GitHub release for this tag.
  #
  #  Deliberate non-goals:
  #
  #  * Static binaries. Would require musl on Linux and a separate
  #    toolchain. Keep the dynamic-link builds for now; users who want
  #    static can build from source with --enable-executable-static.
  #  * Windows. The MCP hasn't been tested there. Linux + macOS cover
  #    every platform Claude Code officially supports today.
  # -------------------------------------------------------------------------
  release:
    name: Release — ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write     # needed to upload release assets
    defaults:
      run:
        working-directory: mcp-server-haskell
    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        with:
          ghc-version:    "9.12.2"
          cabal-version:  "3.12.1.0"
          cabal-update:   true

      - name: Build installable binary
        run: |
          cabal install exe:haskell-flows-mcp \
            --install-method=copy \
            --installdir=./_release \
            --overwrite-policy=always

      - name: Stage release assets
        run: |
          # Name artefacts with OS + arch so the release page is
          # self-documenting: haskell-flows-mcp-linux-x86_64,
          # haskell-flows-mcp-macos-aarch64, etc.
          mkdir -p _release_assets
          os_tag=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch_tag=$(uname -m)
          bin=_release/haskell-flows-mcp
          asset="haskell-flows-mcp-${os_tag}-${arch_tag}"
          cp "$bin" "_release_assets/$asset"
          # Also produce a .tar.gz for platforms that prefer one.
          tar -czf "_release_assets/${asset}.tar.gz" -C _release haskell-flows-mcp

      - name: Build sdist (Hackage-ready)
        # Only run on Linux — sdist is OS-independent, no point in
        # uploading two copies.
        if: matrix.os == 'ubuntu-latest'
        run: |
          cabal sdist --output-dir=_release_assets

      - name: Attach assets to the release
        uses: softprops/action-gh-release@v3
        with:
          files: mcp-server-haskell/_release_assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
