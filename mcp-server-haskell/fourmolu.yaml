# Fourmolu configuration for haskell-flows-mcp.
#
# Defaults chosen to match the existing Phase 1-3 code style so turning on
# the `Fourmolu format check` CI gate doesn't rewrite the whole tree. Tune
# conservatively — any change here forces a full reformat.

indentation: 2
column-limit: 100
function-arrows: trailing
comma-style: leading
import-export-style: diff-friendly
indent-wheres: false
record-brace-space: true
newlines-between-decls: 1
haddock-style: single-line
haddock-style-module: null
let-style: auto
in-style: right-align
single-constraint-parens: always
unicode: never
respectful: true
