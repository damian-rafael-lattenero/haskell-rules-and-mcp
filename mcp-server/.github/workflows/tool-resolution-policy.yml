name: tool-resolution-policy

on:
  pull_request:
    paths:
      - "src/tools/tool-installer.ts"
      - "src/tools/lint.ts"
      - "src/tools/format.ts"
      - "src/tools/hls.ts"
      - "src/scripts/**"
      - "src/__tests__/tool-installer.test.ts"
      - "src/__tests__/integration/tool-handlers.integration.test.ts"
      - "rules/tool-resolution-policy.md"
      - ".github/workflows/tool-resolution-policy.yml"
  push:
    paths:
      - "src/tools/tool-installer.ts"
      - "src/tools/lint.ts"
      - "src/tools/format.ts"
      - "src/tools/hls.ts"
      - "src/scripts/**"
      - "src/__tests__/tool-installer.test.ts"
      - "src/__tests__/integration/tool-handlers.integration.test.ts"
      - "rules/tool-resolution-policy.md"
      - ".github/workflows/tool-resolution-policy.yml"
  workflow_dispatch:

jobs:
  matrix-policy-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit policy tests
        run: npx vitest run src/__tests__/tool-installer.test.ts

      - name: Integration handler degradation tests
        run: npx vitest run --config vitest.integration.config.ts src/__tests__/integration/tool-handlers.integration.test.ts
