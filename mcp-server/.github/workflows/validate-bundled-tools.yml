name: validate-bundled-tools

on:
  pull_request:
    paths:
      - "vendor-tools/**"
      - "src/scripts/**"
      - "src/tools/tool-installer.ts"
      - ".github/workflows/validate-bundled-tools.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate bundled manifest and checksums
        run: npm run tools:validate

      - name: Smoke test bundled binaries
        run: |
          npm run tools:test -- hlint
          npm run tools:test -- fourmolu
          npm run tools:test -- ormolu
